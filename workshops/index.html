<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rễ-root — Workshop Series</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep:     #0a0f0c;
            --bg-card:     #0d1410;
            --white:       #e8efe9;
            --white-dim:   rgba(232,239,233,0.45);
            --white-faint: rgba(232,239,233,0.15);
            --green:       #3a7a52;
            --green-light: #5aad72;
            --green-bright:#7dd99b;
            --green-pale:  rgba(90,173,114,0.12);
        }

        html { font-size: 16px; }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-deep);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #pixelCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, var(--bg-deep) 0%, transparent 100%);
        }

        .nav-logo {
            font-family: 'Handjet', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--green-light);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .nav-context {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white-dim);
        }

        .nav-back {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--white-dim);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-back:hover { color: var(--green-bright); }

        .hub-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            padding: 6rem 2rem 3rem;
        }

        .hub-heading {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hub-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--green-bright);
            display: block;
            margin-bottom: 0.8rem;
        }

        .hub-title {
            font-family: 'Handjet', monospace;
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 600;
            color: var(--green-light);
            line-height: 0.9;
            letter-spacing: 0.04em;
        }

        .hub-sub {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white-dim);
            margin-top: 0.8rem;
        }

        .tentacle-stage {
            position: relative;
            width: min(90vw, 680px);
        }

        .tentacle-svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* Workshop node cards */
        .ws-node {
            position: absolute;
            width: 180px;
            padding: 1.2rem 1.5rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .ws-node--active {
            border: 1px solid var(--green-light);
            background: var(--bg-card);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .ws-node--active:hover {
            transform: translateY(-3px);
            border-color: var(--green-bright);
        }

        .ws-node--coming {
            border: 1px solid var(--white-faint);
            background: var(--bg-card);
            opacity: 0.35;
            pointer-events: none;
        }

        .ws-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: var(--green-light);
        }
        .ws-node--coming .ws-num { color: var(--white-dim); }

        .ws-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--white);
            line-height: 1.4;
        }

        .ws-meta {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            color: var(--white-dim);
        }

        .ws-cta {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.12em;
            color: var(--green-bright);
            margin-top: 0.4rem;
        }

        .ws-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--white-dim);
            margin-top: 0.2rem;
        }

        /* Tentacle SVG animation */
        .root-tentacle-1 {
            stroke-dasharray: 600;
            animation: growRoot 4s ease-in-out infinite;
        }
        .root-tentacle-1-branch {
            stroke-dasharray: 300;
            animation: growRoot 4s ease-in-out 0.6s infinite;
        }

        @keyframes growRoot {
            0%   { stroke-dashoffset: 600; opacity: 0.3; }
            50%  { stroke-dashoffset: 0;   opacity: 1;   }
            100% { stroke-dashoffset: -600; opacity: 0.3; }
        }

        @media (max-width: 600px) {
            .ws-node { width: 140px; padding: 0.9rem 1rem; }
            .ws-title { font-size: 0.75rem; }
            nav { padding: 1rem; }
            .nav-context { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="pixelCanvas"></canvas>

    <nav>
        <a href="../" class="nav-logo">rễ-root</a>
        <span class="nav-context">Workshop Series · Creative Photography · RMIT Vietnam</span>
        <a href="../" class="nav-back">&#x2190; Site</a>
    </nav>

    <div class="hub-wrap">
        <div class="hub-heading">
            <span class="hub-label">Workshop Series</span>
            <h1 class="hub-title">rễ</h1>
            <p class="hub-sub">Creative Photography · RMIT Vietnam</p>
        </div>

        <div class="tentacle-stage" id="tentacleStage">
            <svg class="tentacle-svg" viewBox="-300 -260 600 520" id="tentacleSvg">

                <!-- Centre node -->
                <circle cx="0" cy="0" r="5" fill="#5aad72" opacity="0.8"/>
                <circle cx="0" cy="0" r="12" fill="none" stroke="#5aad72" stroke-width="1" opacity="0.3"/>

                <!-- Workshop 1: bottom-left (active) -->
                <path
                    d="M0,0 C-60,60 -140,100 -240,200"
                    fill="none" stroke="#5aad72" stroke-width="2" stroke-linecap="round"
                    class="root-tentacle-1"
                />
                <!-- Branch for WS1 -->
                <path
                    d="M-144,120 C-160,140 -180,155 -200,170"
                    fill="none" stroke="#5aad72" stroke-width="1.2" stroke-linecap="round" opacity="0.7"
                    class="root-tentacle-1-branch"
                />

                <!-- Workshop 2: bottom-right (dim) -->
                <path
                    d="M0,0 C60,60 140,100 240,200"
                    fill="none" stroke="#3a7a52" stroke-width="1.2" stroke-linecap="round" opacity="0.35"
                />
                <!-- Branch for WS2 -->
                <path
                    d="M144,120 C160,140 180,155 200,170"
                    fill="none" stroke="#3a7a52" stroke-width="0.8" stroke-linecap="round" opacity="0.25"
                />

                <!-- Workshop 3: top-right (dim) -->
                <path
                    d="M0,0 C60,-60 140,-100 240,-200"
                    fill="none" stroke="#3a7a52" stroke-width="1.2" stroke-linecap="round" opacity="0.35"
                />
                <!-- Branch for WS3 -->
                <path
                    d="M144,-120 C160,-140 180,-155 200,-170"
                    fill="none" stroke="#3a7a52" stroke-width="0.8" stroke-linecap="round" opacity="0.25"
                />

                <!-- Workshop 4: top-left (dim) -->
                <path
                    d="M0,0 C-60,-60 -140,-100 -240,-200"
                    fill="none" stroke="#3a7a52" stroke-width="1.2" stroke-linecap="round" opacity="0.35"
                />
                <!-- Branch for WS4 -->
                <path
                    d="M-144,-120 C-160,-140 -180,-155 -200,-170"
                    fill="none" stroke="#3a7a52" stroke-width="0.8" stroke-linecap="round" opacity="0.25"
                />

            </svg>

            <!-- Workshop node cards — positioned via JS to match SVG tip coordinates -->
            <a class="ws-node ws-node--active" href="../workshop1/" id="ws1">
                <span class="ws-num">01</span>
                <span class="ws-title">Seeing What Grows Beneath</span>
                <span class="ws-meta">Creative Photography · RMIT Vietnam</span>
                <span class="ws-cta">Enter &#x2192;</span>
            </a>

            <div class="ws-node ws-node--coming" id="ws2">
                <span class="ws-num">02</span>
                <span class="ws-title">Workshop 2</span>
                <span class="ws-badge">Coming</span>
            </div>

            <div class="ws-node ws-node--coming" id="ws3">
                <span class="ws-num">03</span>
                <span class="ws-title">Workshop 3</span>
                <span class="ws-badge">Coming</span>
            </div>

            <div class="ws-node ws-node--coming" id="ws4">
                <span class="ws-num">04</span>
                <span class="ws-title">Workshop 4</span>
                <span class="ws-badge">Coming</span>
            </div>
        </div>
    </div>

    <script>
    // PIXEL CANVAS
    (function() {
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const PIXEL = 6, GAP = 2, CELL = PIXEL + GAP;
        let cols, rows, rootGrid, time = 0, gridPhase = [], rootData = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width / CELL);
            rows = Math.ceil(canvas.height / CELL);
            buildRoots();
        }

        function growBranch(col, row, length, spread, maxThick, results) {
            let c = col, r = row;
            for (let i = 0; i < length; i++) {
                const thick = Math.max(0, Math.round(maxThick * (1 - i / length * 0.7)));
                for (let t = -thick; t <= thick; t++) {
                    const cc = c + t;
                    if (cc >= 0 && cc < cols && r >= 0 && r < rows) {
                        const key = cc + ',' + r;
                        if (!rootGrid.has(key)) { rootGrid.add(key); results.push({ col: cc, row: r, depth: i / length }); }
                    }
                }
                r += 1;
                c += (Math.random() < 0.45) ? (Math.random() < 0.5 ? -1 : 1) : 0;
                if (Math.random() < spread && i > 4) {
                    growBranch(c + (Math.random() < 0.5 ? -2 : 2), r, Math.floor(length * 0.35), spread * 0.35, Math.max(0, maxThick - 1), results);
                }
                if (r >= rows) break;
            }
        }

        function buildRoots() {
            rootGrid = new Set(); rootData = [];
            gridPhase = new Float32Array(cols * rows);
            for (let i = 0; i < gridPhase.length; i++) gridPhase[i] = Math.random() * Math.PI * 2;
            const cx = Math.floor(cols / 2), ml = rows;
            [
                { c: cx, l: ml, s: 0.06, t: 3 },
                { c: cx - 5, l: ml * 0.88, s: 0.05, t: 2 },
                { c: cx + 5, l: ml * 0.88, s: 0.05, t: 2 },
                { c: cx - 12, l: ml * 0.65, s: 0.04, t: 1 },
                { c: cx + 12, l: ml * 0.65, s: 0.04, t: 1 },
                { c: cx - 20, l: ml * 0.45, s: 0.035, t: 0 },
                { c: cx + 20, l: ml * 0.45, s: 0.035, t: 0 },
                { c: cx - 3, l: ml * 0.92, s: 0.045, t: 2 },
                { c: cx + 3, l: ml * 0.92, s: 0.045, t: 2 },
            ].forEach(s => growBranch(s.c, 0, Math.floor(s.l), s.s, s.t, rootData));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.012;
            // Fixed scroll pct — hub is single screen, show most of root network
            const scrollPct = 0.6;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const a = 0.018 + Math.sin(time * 0.4 + gridPhase[r * cols + c]) * 0.008;
                    if (a > 0.004) { ctx.fillStyle = `rgba(200,220,210,${a})`; ctx.fillRect(c * CELL, r * CELL, PIXEL, PIXEL); }
                }
            }

            const growReveal = 0.1 + scrollPct * 0.9;
            for (let i = 0; i < rootData.length; i++) {
                const rd = rootData[i];
                if (rd.depth >= growReveal) continue;
                const fadeEdge = Math.min(1, (growReveal - rd.depth) * 8);
                const breathe = Math.sin(time * (0.6 + rd.depth * 0.8) + rd.col * 0.5 + rd.row * 0.3) * 0.2;
                const alpha = (0.2 + (1 - rd.depth) * 0.5 + breathe) * fadeEdge;
                if (alpha > 0.01) {
                    const g = Math.floor(80 + (1 - rd.depth) * 90);
                    ctx.fillStyle = `rgba(${Math.floor(20 + rd.depth * 20)},${g},${Math.floor(35 + rd.depth * 15)},${alpha})`;
                    ctx.fillRect(rd.col * CELL, rd.row * CELL, PIXEL, PIXEL);
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize(); draw();
    })();

    // Position workshop node cards to match SVG tip coordinates
    (function() {
        const stage = document.getElementById('tentacleStage');
        const svg   = document.getElementById('tentacleSvg');

        // SVG viewBox: -300 -260 600 520  → centre at (300, 260) in SVG local coords
        // Tip coords in SVG units: WS1(-240,200), WS2(240,200), WS3(240,-200), WS4(-240,-200)
        const tips = [
            { id: 'ws1', x: -240, y: 200 },
            { id: 'ws2', x:  240, y: 200 },
            { id: 'ws3', x:  240, y: -200 },
            { id: 'ws4', x: -240, y: -200 },
        ];

        function positionCards() {
            const svgRect   = svg.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();

            // SVG viewBox dimensions
            const vbW = 600, vbH = 520, vbX = -300, vbY = -260;

            // Scale from SVG units to screen pixels
            const scaleX = svgRect.width  / vbW;
            const scaleY = svgRect.height / vbH;

            tips.forEach(tip => {
                const el = document.getElementById(tip.id);
                if (!el) return;

                // Convert SVG unit to screen pixel (relative to stage)
                const px = (tip.x - vbX) * scaleX + (svgRect.left - stageRect.left);
                const py = (tip.y - vbY) * scaleY + (svgRect.top  - stageRect.top);

                // Offset card so its centre (ish) sits on the tip
                const cardW = el.offsetWidth  || 180;
                const cardH = el.offsetHeight || 100;

                // For left tips anchor right edge; for right tips anchor left edge
                if (tip.x < 0) {
                    el.style.left  = (px - cardW) + 'px';
                } else {
                    el.style.left  = px + 'px';
                }

                // For bottom tips anchor top; for top tips anchor bottom
                if (tip.y > 0) {
                    el.style.top = py + 'px';
                } else {
                    el.style.top = (py - cardH) + 'px';
                }
            });
        }

        // Run after layout settles
        requestAnimationFrame(() => { positionCards(); });
        window.addEventListener('resize', positionCards);
    })();
    </script>

</body>
</html>
